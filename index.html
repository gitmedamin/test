<!DOCTYPE html>
<html>
<body>

<h2>Test Google Sheet</h2>

<input id="name" placeholder="name">
<input id="email" placeholder="email">
<button onclick="send()">Send</button>

<script>
function send(){
  fetch("https://script.google.com/macros/s/AKfycbzYdWlVr9xox5ZjNggygRX5gnMc_O5cGXK-MEXSmguQts-yDkTMxiEU_EIGkJ-TLf9a/exec", {
    method: "POST",
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value
    })
  })
  .then(r => r.text())
  .then(data => alert(data));
}
</script>

</body>
</html>
